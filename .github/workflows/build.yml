name: Gradle Build

on:
  push:

jobs:
  build-gradle-project:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'zulu'
          
      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2
        
      # Запускаем полную сборку проекта вместо одиночн2ого shadowJar
      - name: Run build with Gradle Wrapper
        run: ./gradlew build
        
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Fabric-Tg-Bridge-Jar
          # Звёздочка в конце соберет любые сгенерированные jar-файлы из папки libs
          path: build/libs/*.jar