plugins {
    id 'fabric-loom' version '1.2-SNAPSHOT'
    id 'org.jetbrains.kotlin.jvm' version '1.9.22' // Обнови версию здесь
    id 'com.github.johnrengelman.shadow' version '8.1.1'
}

sourceCompatibility = JavaVersion.VERSION_17
targetCompatibility = JavaVersion.VERSION_17

archivesBaseName = project.archives_base_name
version = project.mod_version
group = project.maven_group

repositories {
    mavenCentral() // Добавлено, чтобы скачать Retrofit и Gson для сборки
}

// Конфигурация для библиотек, которые уйдут в Shadow (Jar-in-Jar / Теневой импорт)
configurations {
    shadow
    implementation.extendsFrom shadow
}

dependencies {
    minecraft "com.mojang:minecraft:${project.minecraft_version}"
    mappings "net.fabricmc:yarn:${project.yarn_mappings}:v2"
    modImplementation "net.fabricmc:fabric-loader:${project.loader_version}"

    // Fabric API и Kotlin Adapter для 1.18.2
    modImplementation "net.fabricmc.fabric-api:fabric-api:${project.fabric_version}"
    modImplementation "net.fabricmc:fabric-language-kotlin:${project.fabric_kotlin_version}"

    // Зависимости, которые пакуем внутрь мода через Shadow
    shadow('com.squareup.retrofit2:retrofit:2.9.0')
    shadow('com.squareup.retrofit2:converter-gson:2.9.0')
    // Gson в майнкрафте уже есть свой, но если нужна именно эта версия, оставляем:
    shadow('com.google.code.gson:gson:2.10.1') 
}

processResources {
    inputs.property "version", project.version

    filesMatching("fabric.mod.json") {
        expand "version": project.version
    }
}

tasks.withType(JavaCompile).configureEach {
    it.options.encoding = "UTF-8"
    it.options.release = 17
}

java {
    withSourcesJar()
}

jar {
    from ("LICENSE") {
        rename { "${it}_${project.archivesBaseName}"}
    }
}

// Корректная настройка ShadowJar + Loom для ремаппинга сторонних библиотек
shadowJar {
    configurations = [project.configurations.shadow]
    archiveClassifier.set('shadow')
}

remapJar {
    dependsOn shadowJar
    inputFile.set(shadowJar.archiveFile)
}

tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach {
    kotlinOptions {
        jvmTarget = "17"
        languageVersion = "1.8" // Гарантирует совместимость метаданных
        apiVersion = "1.8"      // Решает проблему с версией ниже 1.4
    }
}